server:
  port: 8080

spring:
  application:
    name: yuzu-game

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:yuzu}?useSSL=true&requireSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      max-lifetime: 120000
      keepalive-time: 30000
      connection-timeout: 30000
      validation-timeout: 5000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 5000ms

yuzu:
  data-dir: src/main/resources/data
  field-encryption-key: ${FIELD_ENCRYPTION_KEY:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
  llm:
    base-url: ${LLM_BASE_URL}
    api-key: ${LLM_API_KEY}
    model: ${LLM_MODEL:moonshotai/kimi-k2.6}
  audit-llm:
    base-url: ${AUDIT_LLM_BASE_URL}
    api-key: ${AUDIT_LLM_API_KEY}
    model: ${AUDIT_LLM_MODEL:step-3.5-flash}

logging:
  level:
    com.yuzugame: ${LOG_LEVEL:INFO}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}
