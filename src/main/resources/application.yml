server:
  port: 8080

spring:
  application:
    name: yuzu-game

  datasource:
    url: jdbc:mysql://yuzu/yuzu?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: yuzu
    password: your_password_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: your_password_password
      port: 6379
      password: your_password_password
      timeout: 5000ms

yuzu:
  data-dir: src/main/resources/data
  admin:
    username: yuzu
    password: yuzu2026
  llm:
    base-url: https://api.deepseek.com/v1
    api-key: your_password_password
    model: deepseek-v4-flash
  audit-llm:
    base-url: https://api.moonshot.cn/v1
    api-key: your_password_password
    model: kimi-k2.5

logging:
  level:
    com.yuzugame: DEBUG
